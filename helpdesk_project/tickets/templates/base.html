 {% load static %}
 <html>
    <head>
        <link rel='stylesheet' href='{% static 'css/output.css' %}'>
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <title>IT Helpdesk Ticketing System{% block title %}{% endblock %}</title>
    </head>
    <body>
        <nav class="bg-blue-600 p-6">
            Ticketing System
        </nav>
        <main class="container mx-auto p-8 relative">
            
            {% if messages %}
                <div class="absolute top-4 right-4 z-50 space-y-2">
                    {% for message in messages %}
                        <div x-data="{ show: true }" 
                            x-show="show" 
                            x-transition.opacity.duration.300ms
                            class="relative bg-green-100 border border-green-400 text-green-700 px-4 py-3 pr-10 rounded-md shadow-md flex items-center justify-between">
                            
                            <span class="block sm:inline">{{ message }}</span>
                            
                            <button @click="show = false" class="absolute top-0 bottom-0 right-0 px-3 py-3 text-green-700 hover:text-green-900 focus:outline-none">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>

                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            {% endblock %}
            
        </main>
    </body>
 </html>

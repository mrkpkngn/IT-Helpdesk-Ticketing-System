{% extends "../base.html" %}
{% load widget_tweaks %}
{%block title%} - New category {%endblock%}
{%block content%}
<div id="new-category" class="flex flex-col items-center justify-center p-6 gap-6">
<h1 class="text-2xl font-bold">New category</h1>
<form method="POST" action="#" class="grid grid-cols-1 grid-rows-2 justify-center items-center gap-2">
    {% csrf_token %}
    <div class="flex flex-col items-center justify-center w-full col-1 row-1">
        <label for="first_name" class="text-center">Name</label>
        {% render_field category_form.name class="flex w-full border-2 rounded-sm p-1" placeholder="Hardware, Software"%}
    </div>
    <div class="flex flex-col items-center justify-center w-full col-1 row-2">
        <input type="submit" value="Submit" class="bg-blue-500 px-5 py-2 rounded-md text-white font-bold hover:bg-blue-300 hover:cursor-pointer"/>
    </div>
</form>
</div>
{%endblock%}
